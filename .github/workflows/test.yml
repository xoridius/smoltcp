on:
  pull_request:
  merge_group:

name: Test

jobs:
  tests:
    runs-on: ubuntu-22.04
    needs: [check-msrv, consumer-check, test-msrv, test-stable, clippy, test-netsim, check-apple, test-macos-arm64]
    steps:
      - name: Done
        run: exit 0

  check-msrv:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Run Checks MSRV
        run: ./ci.sh check msrv

  check-apple:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Cross-check Apple targets
        run: ./ci.sh apple-check

  consumer-check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Check downstream feature set with warnings denied
        run: ./ci.sh consumer-check

  test-macos-arm64:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Verify Apple Silicon runner
        run: test "$(uname -m)" = arm64
      - name: Run rootless constrained-memory gate
        run: TRACE=0 CARGO_INCREMENTAL=0 CARGO_TARGET_DIR=target/apple-native ./ci.sh ios-full-gate

  test-msrv:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Run Tests MSRV
        run: ./ci.sh test msrv

  clippy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Run Clippy
        run: ./ci.sh clippy

  test-stable:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Run Tests stable
        run: ./ci.sh test stable

  test-nightly:
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Run Tests nightly
        run: ./ci.sh test nightly

  test-netsim:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Run network-simulation tests
        run: ./ci.sh netsim

  test-build-16bit:
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Build for target with 16 bit pointer
        run: ./ci.sh build_16bit
