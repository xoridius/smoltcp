on:
  pull_request:
  merge_group:

name: Fuzz

jobs:
  fuzz:
    runs-on: ubuntu-22.04
    env:
      RUSTUP_TOOLCHAIN: nightly
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-fuzz
        run: cargo install --locked cargo-fuzz
      - name: Build all fuzz targets
        run: ./ci.sh fuzz-build
      - name: Fuzz audited parser targets
        run: |
          ./ci.sh fuzz-smoke 15 wire_parsers
          ./ci.sh fuzz-smoke 15 wire_roundtrip
          ./ci.sh fuzz-smoke 15 tcp_headers
